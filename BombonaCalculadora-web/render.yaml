services:
  - type: web
    name: bombonacalc-web
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_ADAPTER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: bombonacalc-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: ADMIN_PIN
        value: "3007"
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: bombonacalc-db
    plan: starter
